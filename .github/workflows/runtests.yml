name: "run tests"
on:
  pull_request_target:             #https://github.com/ArtiomTr/jest-coverage-report-action?tab=readme-ov-file#forks-with-no-write-permission
    branches:
      - main


permissions:
  contents: write # for schemas
  pull-requests: write
  checks: write
jobs:
     test:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4
          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
             node-version: '22'
          - name: Install Dependencies
            run: cd frontend && npm ci
          - name: Jest coverage report
            uses: ArtiomTr/jest-coverage-report-action@v2.3.1
            with:
              test-script: npx jest --ci --json --coverage --testLocationInResults --outputFile=report.json
              working-directory: ./frontend
              github-token: ${{ secrets.GITHUB_TOKEN }}
